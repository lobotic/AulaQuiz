<!DOCTYPE html>
<html lang="es">

<head>
<link rel="icon" href="/assets/img/favicon.png">
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AulaQuiz - Pantalla</title>

    <link rel="stylesheet" href="style.css">

    <script src="/socket.io/socket.io.js"></script>

</head>

<body>

    <!-- ESPERA -->

    <div id="espera">

         <img
        src="/assets/img/banner.png"
        id="banner"
        alt="AulaQuiz">
 <p>By Lobotic (GPL v3)</p>
        <img id="qr" class="qr">

        <p>Escanea el código para unirte a la partida</p>

    </div>

    <!-- JUEGO -->

    <div id="juego" style="display:none;">

        <div id="izquierda">

            <h2 id="numeroPregunta"></h2>

            <div id="pregunta"></div>

            <div id="opciones"></div>

            <div id="contador">20</div>

        </div>

        <div id="derecha">

            <h3>Alumnos</h3>

            <div id="alumnos"></div>

        </div>

    </div>

    <!-- FIN -->

    <div id="fin" style="display:none;">

        <h1>🏁</h1>

        <h2>El cuestionario ha terminado</h2>

        <p>Gracias por participar</p>

    </div>

    <script src="app.js"></script>

</body>

</html>
